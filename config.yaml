timetable_url: "https://example.com/timetable.xls"
calendar_id: "your-calendar-id@group.calendar.google.com"
credentials_path: "credentials/service_account.json"
state_dir: "state"

# Grid layout of the timetable spreadsheet.
# first_block_row: 1-indexed row of the first block's header line (group names row).
# block_height: total rows per day block (1 header + 12 data = 13).
# time_slot_height: rows per time slot (3 — cells are merged).
# date_col: column holding the date value (merged across all data rows).
# time_col: column holding the time range string, e.g. "8.00-10.30".
# group_col: which group column to extract subjects from (T, U, V, W, X, or Y).
layout:
  first_block_row: 7
  block_height: 13
  time_slot_height: 3
  date_col: "Q"
  time_col: "R"
  group_col: "T"
